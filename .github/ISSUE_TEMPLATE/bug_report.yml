name: Bug report
description: Report a crash, wrong card, UI issue, or broken behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what you saw and what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See ...
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: v0.1.0
    validations:
      required: false
  - type: input
    id: android
    attributes:
      label: Android device/version
      placeholder: Pixel 8 / Android 15
    validations:
      required: false
